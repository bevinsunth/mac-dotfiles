# https://github.com/tmux/tmux/blob/master/EXAMPLES
# bind-key -r {key} repeats without prefix
# set-option -g {option} sets a global option
# set-window-option -g (setw -g) sets a window option globally

# -----------------------------------------------------------------------------
# general
# -----------------------------------------------------------------------------

# 256 colors / true color support for terminals like ghostty
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256color*:Tc"

# enable focus events so editors (nvim) can detect focus changes
set -g focus-events on

# shorter escape time (default 500ms is too laggy for vim/nvim)
set -sg escape-time 0

# increase history limit
set -g history-limit 100000

# start window/pane index at 1 to match keyboard layout
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# enable mouse (resize splits, scroll, select pane)
set -g mouse on

# -----------------------------------------------------------------------------
# keybinds
# -----------------------------------------------------------------------------

# change prefix from C-b to C-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux config reloaded"

# intuitive split bindings
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# vim-style pane navigation
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# vim-style pane resizing (repeatable)
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# vim-style copy mode navigation
setw -g mode-keys vi

# -----------------------------------------------------------------------------
# status bar
# -----------------------------------------------------------------------------

set -g status-position top
set -g status-style "bg=default,fg=white"
set -g status-left "#[fg=green,bold] #S "
set -g status-right "#[fg=cyan]%Y-%m-%d #[fg=yellow]%H:%M "
set -g status-left-length 40
set -g status-right-length 40

setw -g window-status-current-style "fg=black,bg=cyan,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "